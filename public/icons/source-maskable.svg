<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Lumina Network">
  <defs>
    <linearGradient id="bgMask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>
  <!-- 100% canvas. The maskable safe zone is the inner 80% (10 % padding
       on each side); critical glyphs are confined to it. -->
  <rect width="512" height="512" fill="url(#bgMask)" />
  <g fill="#f7f4ee">
    <circle cx="256" cy="200" r="28" />
    <circle cx="200" cy="296" r="22" />
    <circle cx="312" cy="296" r="22" />
    <circle cx="256" cy="368" r="22" />
  </g>
  <g stroke="#f7f4ee" stroke-width="10" stroke-linecap="round" fill="none">
    <line x1="256" y1="200" x2="200" y2="296" />
    <line x1="256" y1="200" x2="312" y2="296" />
    <line x1="200" y1="296" x2="312" y2="296" />
    <line x1="200" y1="296" x2="256" y2="368" />
    <line x1="312" y1="296" x2="256" y2="368" />
  </g>
</svg>
